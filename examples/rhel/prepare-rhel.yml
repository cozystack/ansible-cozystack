---
# Example: Prepare RHEL 8+/CentOS Stream 8+/Rocky/Alma nodes for Cozystack
# This playbook installs required packages, configures kernel parameters,
# and sets k3s server arguments compatible with k3s.orchestration collection.
#
# Run before k3s deployment: ansible-playbook prepare-rhel.yml

- name: Prepare RHEL/CentOS nodes for Cozystack
  hosts: cluster
  become: true
  vars:
    # Packages required by Cozystack on every node.
    # See README "Node Prerequisites" for what each is for.
    cozystack_packages:
      # Storage backends: NFS, iSCSI, Multipath
      - nfs-utils
      - iscsi-initiator-utils
      - device-mapper-multipath
      # iptables userspace (nftables backend on RHEL 8+). Required by k3s
      # kube-proxy replacement and by the optional cozystack_flush_iptables
      # task below. Not installed by default on RHEL 10 / Rocky 10 / Alma 10.
      - iptables-nft
      # LINSTOR LVM/thin provisioning (required by Cozystack storage)
      - lvm2
      - device-mapper-persistent-data
      # Kernel headers and extra modules — Piraeus operator compiles DRBD
      # 9.x against the RUNNING kernel, not the latest staged one, so pin
      # to ansible_kernel. Oracle Linux uses a different kernel flavor
      # (UEK, suffix *.uek.*): switch package prefix accordingly.
      # - kernel-devel / kernel-modules-extra on stock RHEL/CentOS
      # - kernel-uek-devel / kernel-uek-modules-extra on Oracle Linux UEK
      - "{{ 'kernel-uek-devel' if 'uek' in ansible_kernel else 'kernel-devel' }}-{{ ansible_kernel }}"
      - "{{ 'kernel-uek-modules-extra' if 'uek' in ansible_kernel else 'kernel-modules-extra' }}-{{ ansible_kernel }}"

    # Opt-out toggles: cozystack_enable_zfs and cozystack_enable_kubevirt
    # (both default to true). Override from inventory to skip. They are
    # intentionally not defined here so inventory vars can take effect.
    #
    # ZFS: not in RHEL default repos; the tasks below import the OpenZFS
    # GPG key and install the release RPM before installing zfs.
    #
    # KubeVirt: loads vhost_net, tun, and kvm_intel or kvm_amd kernel
    # modules. QEMU and libvirt run inside KubeVirt pods, so no host
    # userspace packages are installed.

    # OpenZFS release RPM per RHEL major. OpenZFS publishes different
    # release RPM versions for each EL major; the mapping below is
    # maintained manually and bumped when OpenZFS rotates. See
    # https://zfsonlinux.org/ for current URLs.
    #
    # To add/override an entry (for example once OpenZFS publishes an
    # el10 RPM), set `cozystack_zfs_release_rpm_extra` from inventory:
    #   cozystack_zfs_release_rpm_extra:
    #     "10": "https://zfsonlinux.org/epel/zfs-release-X-Y.el10.noarch.rpm"
    # The user-supplied dict is merged on top of the built-in one, so
    # overriding a single major does not wipe out the others.
    cozystack_zfs_release_rpm_by_major_default:
      "8": "https://zfsonlinux.org/epel/zfs-release-2-3.el8.noarch.rpm"
      "9": "https://zfsonlinux.org/epel/zfs-release-2-8.el9.noarch.rpm"
    cozystack_zfs_release_rpm_by_major: >-
      {{ cozystack_zfs_release_rpm_by_major_default
         | combine(cozystack_zfs_release_rpm_extra | default({})) }}
    cozystack_zfs_release_rpm: "{{ cozystack_zfs_release_rpm_by_major[ansible_distribution_major_version] | default('') }}"

    # OpenZFS project GPG key, imported before installing the release RPM
    # so we never disable GPG verification. The URL tracks the master
    # branch of the openzfs docs repo. If OpenZFS renames/moves the key
    # file this URL will 404; update to the current path (or pin to a
    # known-good commit SHA) when that happens.
    cozystack_zfs_gpg_key_url: "https://raw.githubusercontent.com/zfsonlinux/zfsonlinux.github.com/master/zfs-release/RPM-GPG-KEY-openzfs-key2"

    # Optional: modules that may be compiled into the kernel on some
    # distros. modprobe failures here are tolerated.
    cozystack_kernel_modules_optional:
      - overlay
      - openvswitch

    # Required kernel modules. If any of these fails to load the playbook
    # stops — the next steps (sysctl, Kube-OVN) depend on them.
    cozystack_kernel_modules_required:
      - br_netfilter
      - geneve
      - ip_tables
      - iptable_nat

    # Kernel parameters for Cozystack
    cozystack_sysctl_params:
      - { name: fs.inotify.max_user_watches, value: "524288" }
      - { name: fs.inotify.max_user_instances, value: "8192" }
      - { name: fs.inotify.max_queued_events, value: "65536" }
      - { name: fs.file-max, value: "2097152" }
      - { name: fs.aio-max-nr, value: "1048576" }
      - { name: net.ipv4.ip_forward, value: "1" }
      - { name: net.ipv4.conf.all.forwarding, value: "1" }
      - { name: net.ipv6.conf.all.forwarding, value: "1" }
      - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
      - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
      - { name: vm.swappiness, value: "1" }

    # k3s server arguments required by Cozystack.
    # These disable built-in components that Cozystack replaces.
    cozystack_k3s_server_args: >-
      --disable=traefik
      --disable=servicelb
      --disable=local-storage
      --disable=metrics-server
      --disable-network-policy
      --disable-kube-proxy
      --flannel-backend=none
      --cluster-domain=cozy.local
      --kubelet-arg=max-pods=220

    # k3s server config YAML (CIDRs).
    cozystack_k3s_server_config_yaml: |
      cluster-cidr: 10.42.0.0/16
      service-cidr: 10.43.0.0/16

  handlers:
    - name: Restart multipathd
      ansible.builtin.systemd:
        name: multipathd
        state: restarted
      failed_when: false  # tolerated: same reason as the enable task below

    # Refresh service facts on the same notify topic so the restart
    # handler below sees the current unit set. Defined first, so it runs
    # first (handlers fire in definition order, not notify order).
    - name: Refresh service facts before k3s restart
      ansible.builtin.service_facts:
      listen: Restart k3s to apply containerd config

    - name: Restart k3s to apply containerd config
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - k3s
        - k3s-agent
      # Restart only the unit that exists on this node: a server runs
      # k3s, an agent runs k3s-agent, and on a full-pipeline run neither
      # exists yet when prepare runs (the drop-in is read at first k3s
      # start instead). service_facts keys systemd units with the
      # .service suffix. A unit that IS present but fails to restart
      # still fails the play — a malformed drop-in or a k3s that will not
      # come back is surfaced, not masked by failed_when: false.
      when: (item ~ '.service') in ansible_facts.services

  tasks:
    - name: Create k3s_cluster group for k3s.orchestration
      ansible.builtin.group_by:
        key: k3s_cluster

    - name: Set k3s server args for Cozystack
      ansible.builtin.set_fact:
        extra_server_args: >-
          {{ cozystack_k3s_server_args }}
          {{ cozystack_k3s_extra_args | default("") }}
      when: extra_server_args is not defined

    - name: Set k3s server config for Cozystack
      ansible.builtin.set_fact:
        server_config_yaml: "{{ cozystack_k3s_server_config_yaml }}"
      when: server_config_yaml is not defined

    - name: Install required packages
      ansible.builtin.dnf:
        name: "{{ cozystack_packages }}"
        state: present
        update_cache: true

    - name: Try loading optional kernel modules (may be built-in or missing)
      community.general.modprobe:
        name: "{{ item }}"
      loop: "{{ cozystack_kernel_modules_optional }}"
      failed_when: false  # overlay is usually built-in; openvswitch may be absent on stripped kernels

    - name: Check which optional kernel modules are present
      ansible.builtin.stat:
        path: "/sys/module/{{ item }}"
      loop: "{{ cozystack_kernel_modules_optional }}"
      register: _cozystack_optional_modules_stat

    - name: Warn about unavailable optional kernel modules
      ansible.builtin.debug:
        msg: >-
          WARNING: optional kernel module '{{ item.item }}' is not available
          on this host. Container runtimes (overlay) or Kube-OVN (openvswitch)
          may not function. Install the matching kernel-modules-extra package
          or rebuild the kernel with the module enabled.
      loop: "{{ _cozystack_optional_modules_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not (item.stat.exists | default(false))

    - name: Load required Kubernetes and Kube-OVN kernel modules
      community.general.modprobe:
        name: "{{ item }}"
      loop: "{{ cozystack_kernel_modules_required }}"

    # Persist only optional modules that are actually present — otherwise
    # systemd-modules-load.service fails on every boot for missing modules.
    - name: Load kernel modules at boot (containerd, Kubernetes, Kube-OVN)
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack.conf
        mode: "0644"
        content: "{{ (_cozystack_loaded_optional + cozystack_kernel_modules_required) | join('\n') }}\n"
      vars:
        _cozystack_loaded_optional: >-
          {{ _cozystack_optional_modules_stat.results
             | selectattr('stat.exists', 'equalto', true)
             | map(attribute='item')
             | list }}

    # CDI (Containerized Data Importer) streams VM disk images into raw
    # block volumes from a NON-root importer pod. containerd only chowns
    # the block device to the pod's SecurityContext UID/GID when
    # device_ownership_from_security_context is enabled on the CRI
    # plugin, and k3s ships it disabled. Without it the importer dies
    # with "blockdev: cannot open /dev/cdi-block-volume: Permission
    # denied", the DataVolume hangs in ImportInProgress, and every VM
    # that references the disk stays Pending.
    #
    # The drop-in is merged by containerd on top of k3s's generated
    # config.toml via the config-v3.toml.d import glob — read at first
    # k3s start (full pipeline) or applied by the handler on re-runs
    # against a running cluster. config-v3.toml.d and
    # io.containerd.cri.v1.runtime are the containerd 2.x (config
    # version 3) paths shipped by current k3s, and the content is
    # hardcoded for that schema. cozystack_k3s_containerd_dropin_dir
    # only relocates the file (e.g. a non-default k3s data-dir); it does
    # not rewrite the content, so a containerd 1.x cluster needs a
    # hand-written config.toml.d drop-in (version = 2,
    # io.containerd.grpc.v1.cri) instead.
    - name: Ensure k3s containerd config drop-in directory exists
      ansible.builtin.file:
        path: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}"
        state: directory
        mode: "0755"
      when: cozystack_enable_kubevirt | default(true) | bool

    - name: Enable device_ownership_from_security_context for CDI block imports
      ansible.builtin.copy:
        dest: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}/10-cozystack-cri.toml"
        mode: "0644"
        content: |
          version = 3

          [plugins.'io.containerd.cri.v1.runtime']
            device_ownership_from_security_context = true
      when: cozystack_enable_kubevirt | default(true) | bool
      notify: Restart k3s to apply containerd config

    # Reverse the drop-in when KubeVirt is turned off: a host that
    # carried 10-cozystack-cri.toml from an earlier enabled run would
    # otherwise keep device_ownership_from_security_context on, so the
    # host state no longer matches the toggle. Removal notifies the
    # restart handler so a running cluster drops the setting too. (No-op
    # when the file was never written — file: absent reports unchanged.)
    - name: Remove containerd CDI drop-in when KubeVirt is disabled
      ansible.builtin.file:
        path: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}/10-cozystack-cri.toml"
        state: absent
      when: not (cozystack_enable_kubevirt | default(true) | bool)
      notify: Restart k3s to apply containerd config

    - name: Ensure multipath drop-in directory exists
      ansible.builtin.file:
        path: /etc/multipath/conf.d
        state: directory
        mode: "0755"

    # CRITICAL: without this blacklist, multipathd grabs drbd* devices
    # and makes LINSTOR volumes inaccessible after reboot.
    - name: Blacklist DRBD devices in multipathd
      ansible.builtin.copy:
        dest: /etc/multipath/conf.d/cozystack-drbd-blacklist.conf
        mode: "0644"
        content: |
          blacklist {
              devnode "^drbd[0-9]+"
          }
      notify: Restart multipathd

    # Exclude DRBD, device-mapper, zvol and loop devices from the host's
    # LVM device scanning. Without this the host LVM may scan and activate
    # volume groups backed by LINSTOR/DRBD volumes — or located inside
    # loop-mounted images — making them unavailable to the satellite.
    # Mirrors the global_filter shipped in the Talos machine config.
    # Override cozystack_lvm_global_filter from inventory on hosts whose
    # own PVs sit on device-mapper devices (LVM-on-LUKS, multipath) so
    # they are not filtered out — e.g. drop the "r|^/dev/dm-.*|" entry.
    - name: Exclude virtual and loop devices from host LVM scanning
      ansible.builtin.lineinfile:
        path: /etc/lvm/lvm.conf
        regexp: '^\s*#?\s*global_filter\s*='
        insertafter: '^\s*devices\s*{'
        line: '        global_filter = {{ cozystack_lvm_global_filter |
          default(["r|^/dev/drbd.*|", "r|^/dev/dm-.*|", "r|^/dev/zd.*|",
          "r|^/dev/loop.*|"]) | to_json }}'

    # Confirm LVM honours the filter. `lvmconfig devices/global_filter`
    # reports the setting only when it sits inside the devices {} block, so a
    # filter that landed elsewhere (an lvm.conf with no devices section) is
    # caught here instead of silently leaving the host LVM unfiltered.
    - name: Read back the effective host LVM global_filter
      ansible.builtin.command:
        cmd: lvmconfig devices/global_filter
      register: _cozystack_lvm_filter_check
      changed_when: false
      failed_when: false

    - name: Fail if the host LVM does not honour the configured global_filter
      ansible.builtin.assert:
        that:
          - _cozystack_lvm_filter_check.rc == 0
        fail_msg: >-
          LVM does not report devices/global_filter as active
          (rc={{ _cozystack_lvm_filter_check.rc }}); the setting likely landed
          outside the devices {} block. Ensure /etc/lvm/lvm.conf contains a
          'devices {' section.
        success_msg: Host LVM global_filter is active.

    - name: Configure sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop: "{{ cozystack_sysctl_params }}"

    - name: Stop and disable firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: false
        state: stopped
      when: cozystack_flush_iptables | default(false)
      failed_when: false

    - name: Flush iptables INPUT chain
      ansible.builtin.iptables:
        chain: INPUT
        flush: true
      when: cozystack_flush_iptables | default(false)

    - name: Set iptables INPUT policy to ACCEPT
      ansible.builtin.iptables:
        chain: INPUT
        policy: ACCEPT
      when: cozystack_flush_iptables | default(false)

    - name: Enable iscsid service
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Enable multipathd service
      ansible.builtin.systemd:
        name: multipathd
        enabled: true
        state: started
      register: _cozystack_multipathd
      failed_when: false  # tolerated: VMs / kernels without dm_multipath

    - name: Warn if multipathd failed to start
      ansible.builtin.debug:
        msg: >-
          WARNING: multipathd could not start. Likely causes:
          dm_multipath kernel module missing, or no multipath-capable
          storage attached. LINSTOR still works without MPIO, but
          iSCSI failover will not. The DRBD blacklist file is in place
          so this will take effect once multipathd can start.
      when: _cozystack_multipathd.failed | default(false)

    # ZFS backend for LINSTOR.
    # OpenZFS does not publish kmod builds for Oracle's UEK kernel, only
    # for the stock RHEL kernel. Warn and skip on UEK hosts — user can
    # switch to kernel-el or install zfs manually.
    - name: Warn that ZFS is not supported on UEK kernels
      ansible.builtin.debug:
        msg: >-
          NOTE: Oracle UEK kernel ({{ ansible_kernel }}) detected. OpenZFS
          does not publish kmod packages for UEK. Switch the host to the
          stock RHEL-compat kernel (package "kernel") and reboot, or set
          cozystack_enable_zfs: false to silence this notice.
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' in ansible_kernel"

    - name: Fail fast when no OpenZFS release RPM URL is configured
      ansible.builtin.fail:
        msg: >-
          No OpenZFS release RPM URL configured for RHEL
          {{ ansible_distribution_major_version }}. Add an entry to
          cozystack_zfs_release_rpm_by_major or set
          cozystack_enable_zfs: false.
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"
        - cozystack_zfs_release_rpm | length == 0

    - name: Import OpenZFS GPG key
      ansible.builtin.rpm_key:
        key: "{{ cozystack_zfs_gpg_key_url }}"
        state: present
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"

    - name: Install OpenZFS release RPM
      ansible.builtin.dnf:
        name: "{{ cozystack_zfs_release_rpm }}"
        state: present
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"

    - name: Install ZFS packages
      ansible.builtin.dnf:
        name: zfs
        state: present
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"

    - name: Load ZFS kernel module now
      community.general.modprobe:
        name: zfs
      register: _cozystack_zfs_modprobe
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"
      failed_when: false  # tolerated: Secure Boot / unsigned-module hosts

    # Only persist zfs in modules-load.d if the module actually loaded —
    # otherwise systemd-modules-load.service will fail on every boot.
    - name: Load ZFS kernel module at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack-zfs.conf
        mode: "0644"
        content: "zfs\n"
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"
        - _cozystack_zfs_modprobe is defined
        - not (_cozystack_zfs_modprobe.failed | default(false))

    - name: Warn if ZFS module failed to load
      ansible.builtin.debug:
        msg: >-
          WARNING: modprobe zfs failed ({{ _cozystack_zfs_modprobe.msg | default('unknown') }}).
          LINSTOR ZFS backend will not work until this is resolved.
          Set cozystack_enable_zfs: false to silence.
      when:
        - cozystack_enable_zfs | default(true) | bool
        - "'uek' not in ansible_kernel"
        - _cozystack_zfs_modprobe is defined
        - _cozystack_zfs_modprobe.failed | default(false)

    # Remove the drop-in when ZFS is disabled OR when modprobe failed,
    # so systemd-modules-load does not keep failing every boot on a
    # module that cannot be loaded.
    - name: Remove ZFS modules-load drop-in when not active
      ansible.builtin.file:
        path: /etc/modules-load.d/cozystack-zfs.conf
        state: absent
      when: >-
        not (cozystack_enable_zfs | default(true) | bool) or
        ('uek' in ansible_kernel) or
        (_cozystack_zfs_modprobe is defined and
         _cozystack_zfs_modprobe.failed | default(false))

    # KubeVirt kernel modules (opt-out via cozystack_enable_kubevirt=false).
    # QEMU and libvirt run inside KubeVirt pods; no host packages needed.
    - name: Detect CPU vendor for KVM module selection
      ansible.builtin.set_fact:
        _cozystack_kvm_module: >-
          {{ 'kvm_intel' if 'GenuineIntel' in (ansible_processor | join(' '))
             else 'kvm_amd' if 'AuthenticAMD' in (ansible_processor | join(' '))
             else '' }}
      when: cozystack_enable_kubevirt | default(true) | bool

    # Required KubeVirt modules must load; if vhost_net or tun is unavailable
    # (custom/stripped kernel) the playbook fails here rather than proceed.
    - name: Load required KubeVirt kernel modules now
      community.general.modprobe:
        name: "{{ item }}"
      loop:
        - vhost_net
        - tun
      when: cozystack_enable_kubevirt | default(true) | bool

    # Try loading the CPU-vendor KVM module; unsupported CPU, nested virt
    # disabled in BIOS, or container host → modprobe fails. Tolerate the
    # failure here and check /sys/module afterwards so the persisted
    # modules-load.d file only lists modules that actually loaded
    # (otherwise systemd-modules-load fails on every boot).
    - name: Load CPU-vendor KVM module now (best-effort)
      community.general.modprobe:
        name: "{{ _cozystack_kvm_module }}"
      failed_when: false
      when:
        - cozystack_enable_kubevirt | default(true) | bool
        - (_cozystack_kvm_module | default('')) | length > 0

    - name: Check whether CPU-vendor KVM module is loaded
      ansible.builtin.stat:
        path: "/sys/module/{{ _cozystack_kvm_module }}"
      register: _cozystack_kvm_module_stat
      when:
        - cozystack_enable_kubevirt | default(true) | bool
        - (_cozystack_kvm_module | default('')) | length > 0

    - name: Persist KubeVirt kernel modules for boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack-kubevirt.conf
        mode: "0644"
        content: |
          vhost_net
          tun
          {% if _cozystack_kvm_module_stat is defined and (_cozystack_kvm_module_stat.stat.exists | default(false)) %}
          {{ _cozystack_kvm_module }}
          {% endif %}
      when: cozystack_enable_kubevirt | default(true) | bool

    - name: Remove KubeVirt modules-load drop-in when disabled
      ansible.builtin.file:
        path: /etc/modules-load.d/cozystack-kubevirt.conf
        state: absent
      when: not (cozystack_enable_kubevirt | default(true) | bool)
