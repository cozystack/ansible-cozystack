---
# Example: Prepare Ubuntu/Debian nodes for Cozystack
# This playbook installs required packages, configures kernel parameters,
# and sets k3s server arguments compatible with k3s.orchestration collection.
#
# Targets Ubuntu 22.04+ / 24.04 and Debian 12. Distro-specific parts:
# - linux-modules-extra is only installed on Ubuntu (ships openvswitch
#   and geneve on cloud/minimal kernels). Debian bundles these in the
#   base kernel image.
# - ZFS automation is Ubuntu-only. Debian needs contrib + zfs-dkms set
#   up manually; set cozystack_enable_zfs: false to skip.
#
# Run before k3s deployment: ansible-playbook prepare-ubuntu.yml

- name: Prepare Ubuntu/Debian nodes for Cozystack
  hosts: cluster
  become: true
  vars:
    # Packages required by Cozystack on every node.
    # See README "Node Prerequisites" for what each is for.
    cozystack_packages:
      # Storage backends: NFS, iSCSI, Multipath
      - nfs-common
      - open-iscsi
      - multipath-tools
      # LINSTOR LVM/thin provisioning (required by Cozystack storage)
      - lvm2
      - thin-provisioning-tools
      # Kernel headers — Piraeus operator compiles DRBD 9.x at runtime.
      # Pin to ansible_kernel so headers match the running kernel.
      - "linux-headers-{{ ansible_kernel }}"
      # gnupg is required by ansible.builtin.apt_repository for PPA
      # signing-key fingerprint handling. Ubuntu 24.04+ removed
      # apt-key, so gpg is the only path; stock cloud images already
      # ship it but minimal/container images may not.
      - gnupg

    # Ubuntu-only: linux-modules-extra-* ships openvswitch and geneve
    # on cloud/minimal kernels. Debian includes these in its base
    # kernel image and has no such split package.
    #
    # Ubuntu 26.04 LTS bundles openvswitch and vport-geneve into the
    # main linux-image-generic and ships no linux-modules-extra-*
    # package for kernel 7.x. The task below auto-skips on 26.04+,
    # but if `ansible_distribution_version` is unreliable on a host
    # (custom builds, derivatives), force-skip from inventory:
    #   cozystack_ubuntu_extra_packages: []
    cozystack_ubuntu_extra_packages:
      - "linux-modules-extra-{{ ansible_kernel }}"

    # Opt-out toggles are intentionally not defined here so they can be
    # overridden from inventory. Each task references them via
    # `| default(true)`. Set cozystack_enable_zfs: false or
    # cozystack_enable_kubevirt: false in your inventory to skip.
    #
    # ZFS: installs zfsutils-linux. Ubuntu 22.04+ ships the ZFS kernel
    # module via linux-modules-extra-* (pulled in above). On Debian
    # zfsutils-linux is in contrib AND the kernel module requires
    # zfs-dkms; this example does not automate Debian ZFS — set
    # cozystack_enable_zfs: false and install manually.
    #
    # KubeVirt: loads vhost_net, tun, and kvm_intel or kvm_amd kernel
    # modules. QEMU and libvirt run inside KubeVirt pods, so no host
    # userspace packages are installed.

    # Optional: modules that may be compiled into the kernel on some
    # distros. modprobe failures here are tolerated.
    cozystack_kernel_modules_optional:
      - overlay
      - openvswitch

    # Required kernel modules. If any of these fails to load the playbook
    # stops — the next steps (sysctl, Kube-OVN) depend on them.
    cozystack_kernel_modules_required:
      - br_netfilter
      - geneve
      - ip_tables
      - iptable_nat

    # Kernel parameters for Cozystack
    cozystack_sysctl_params:
      - { name: fs.inotify.max_user_watches, value: "524288" }
      - { name: fs.inotify.max_user_instances, value: "8192" }
      - { name: fs.inotify.max_queued_events, value: "65536" }
      - { name: fs.file-max, value: "2097152" }
      - { name: fs.aio-max-nr, value: "1048576" }
      - { name: net.ipv4.ip_forward, value: "1" }
      - { name: net.ipv4.conf.all.forwarding, value: "1" }
      - { name: net.ipv6.conf.all.forwarding, value: "1" }
      - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
      - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
      - { name: vm.swappiness, value: "1" }

    # DRBD via dkms on Ubuntu hosts where the in-cluster compile path is
    # unavailable (UEFI Secure Boot + kernel lockdown rejects the
    # unsigned modules piraeus-operator builds in-cluster — "Key was
    # rejected by service"). Pre-installing drbd-dkms lets dkms+shim
    # sign the module with a per-host MOK key, and piraeus-operator's
    # loader auto-detects host-loaded DRBD and exits cleanly. Secure
    # Boot is the common case on bare-metal installs and some bare-metal
    # cloud SKUs; standard cloud-VM images on AWS/GCP/Azure usually ship
    # without Secure Boot enforcement and the in-cluster compile path
    # works as before.
    #
    # Set cozystack_enable_drbd_dkms: false on Talos hosts (Talos ships
    # signed DRBD modules in extensions) or where Secure Boot is
    # disabled and you prefer the in-cluster compile path.
    # Override cozystack_drbd_ppa from inventory to point at a local
    # mirror of the LINBIT archive.

  handlers:
    - name: Restart multipathd
      ansible.builtin.systemd:
        name: multipathd
        state: restarted
      # Handler — no register, no downstream gate consults the result,
      # so failed_when: false is safe here. Tolerated reason: VMs /
      # kernels without dm_multipath. (See CLAUDE.md for why
      # ignore_errors is required for tasks WHOSE registered variable
      # IS consulted downstream.)
      failed_when: false

    # Refresh service facts on the same notify topic so the restart
    # handler below sees the current unit set. Defined first, so it runs
    # first (handlers fire in definition order, not notify order).
    - name: Refresh service facts before k3s restart
      ansible.builtin.service_facts:
      listen: Restart k3s to apply containerd config

    - name: Restart k3s to apply containerd config
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - k3s
        - k3s-agent
      # Restart only the unit that exists on this node: a server runs
      # k3s, an agent runs k3s-agent, and on a full-pipeline run neither
      # exists yet when prepare runs (the drop-in is read at first k3s
      # start instead). service_facts keys systemd units with the
      # .service suffix. A unit that IS present but fails to restart
      # still fails the play — a malformed drop-in or a k3s that will not
      # come back is surfaced, not masked by failed_when: false.
      when: (item ~ '.service') in ansible_facts.services

  tasks:
    # Backward-compat for custom inventories that do not declare the
    # k3s_cluster group statically: group_by recreates it in-process so a
    # chained site.yml run still works. The shipped inventory.yml declares
    # the group statically, and the cozystack k3s settings now live in
    # group_vars/all.yml, so a split prepare + k3s.orchestration.site run
    # keeps the tuned configuration.
    - name: Create k3s_cluster group for k3s.orchestration
      ansible.builtin.group_by:
        key: k3s_cluster

    # Single source of truth for the LINBIT-PPA-supported release
    # codename list. Inventory may extend the list (e.g.
    # `cozystack_drbd_supported_releases: [jammy, noble, resolute]`)
    # once LINBIT publishes for a new series; the set_fact only fires
    # when the inventory does not already define the variable, so
    # inventory wins.
    - name: Default cozystack_drbd_supported_releases when unset
      ansible.builtin.set_fact:
        cozystack_drbd_supported_releases:
          - jammy
          - noble
      when: cozystack_drbd_supported_releases is not defined

    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ cozystack_packages }}"
        state: present
        update_cache: true

    # Auto-skip on Ubuntu 26.04+ (no linux-modules-extra-* for kernel
    # 7.x, modules ship in linux-image-generic) and when the list is
    # explicitly empty (inventory force-skip).
    - name: Install Ubuntu-only extra kernel modules
      ansible.builtin.apt:
        name: "{{ cozystack_ubuntu_extra_packages }}"
        state: present
      when:
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_version is version('26.04', '<')
        - cozystack_ubuntu_extra_packages | length > 0

    - name: Try loading optional kernel modules (may be built-in or missing)
      community.general.modprobe:
        name: "{{ item }}"
      loop: "{{ cozystack_kernel_modules_optional }}"
      failed_when: false  # overlay is usually built-in; openvswitch may be absent on stripped kernels

    - name: Check which optional kernel modules are present
      ansible.builtin.stat:
        path: "/sys/module/{{ item }}"
      loop: "{{ cozystack_kernel_modules_optional }}"
      register: _cozystack_optional_modules_stat

    - name: Warn about unavailable optional kernel modules
      ansible.builtin.debug:
        msg: >-
          WARNING: optional kernel module '{{ item.item }}' is not available
          on this host. Container runtimes (overlay) or Kube-OVN (openvswitch)
          may not function. Install the matching linux-modules-extra package
          or rebuild the kernel with the module enabled.
      loop: "{{ _cozystack_optional_modules_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not (item.stat.exists | default(false))

    - name: Load required Kubernetes and Kube-OVN kernel modules
      community.general.modprobe:
        name: "{{ item }}"
      loop: "{{ cozystack_kernel_modules_required }}"

    # Persist only optional modules that are actually present — otherwise
    # systemd-modules-load.service fails on every boot for missing modules.
    - name: Load kernel modules at boot (containerd, Kubernetes, Kube-OVN)
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack.conf
        mode: "0644"
        content: "{{ (_cozystack_loaded_optional + cozystack_kernel_modules_required) | join('\n') }}\n"
      vars:
        _cozystack_loaded_optional: >-
          {{ _cozystack_optional_modules_stat.results
             | selectattr('stat.exists', 'equalto', true)
             | map(attribute='item')
             | list }}

    # CDI (Containerized Data Importer) streams VM disk images into raw
    # block volumes from a NON-root importer pod. containerd only chowns
    # the block device to the pod's SecurityContext UID/GID when
    # device_ownership_from_security_context is enabled on the CRI
    # plugin, and k3s ships it disabled. Without it the importer dies
    # with "blockdev: cannot open /dev/cdi-block-volume: Permission
    # denied", the DataVolume hangs in ImportInProgress, and every VM
    # that references the disk stays Pending.
    #
    # The drop-in is merged by containerd on top of k3s's generated
    # config.toml via the config-v3.toml.d import glob — read at first
    # k3s start (full pipeline) or applied by the handler on re-runs
    # against a running cluster. config-v3.toml.d and
    # io.containerd.cri.v1.runtime are the containerd 2.x (config
    # version 3) paths shipped by current k3s, and the content is
    # hardcoded for that schema. cozystack_k3s_containerd_dropin_dir
    # only relocates the file (e.g. a non-default k3s data-dir); it does
    # not rewrite the content, so a containerd 1.x cluster needs a
    # hand-written config.toml.d drop-in (version = 2,
    # io.containerd.grpc.v1.cri) instead.
    - name: Ensure k3s containerd config drop-in directory exists
      ansible.builtin.file:
        path: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}"
        state: directory
        mode: "0755"
      when: cozystack_enable_kubevirt | default(true) | bool

    - name: Enable device_ownership_from_security_context for CDI block imports
      ansible.builtin.copy:
        dest: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}/10-cozystack-cri.toml"
        mode: "0644"
        content: |
          version = 3

          [plugins.'io.containerd.cri.v1.runtime']
            device_ownership_from_security_context = true
      when: cozystack_enable_kubevirt | default(true) | bool
      notify: Restart k3s to apply containerd config

    # Reverse the drop-in when KubeVirt is turned off: a host that
    # carried 10-cozystack-cri.toml from an earlier enabled run would
    # otherwise keep device_ownership_from_security_context on, so the
    # host state no longer matches the toggle. Removal notifies the
    # restart handler so a running cluster drops the setting too. (No-op
    # when the file was never written — file: absent reports unchanged.)
    - name: Remove containerd CDI drop-in when KubeVirt is disabled
      ansible.builtin.file:
        path: "{{ cozystack_k3s_containerd_dropin_dir | default('/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d') }}/10-cozystack-cri.toml"
        state: absent
      when: not (cozystack_enable_kubevirt | default(true) | bool)
      notify: Restart k3s to apply containerd config

    - name: Ensure multipath drop-in directory exists
      ansible.builtin.file:
        path: /etc/multipath/conf.d
        state: directory
        mode: "0755"

    # CRITICAL: without this blacklist, multipathd grabs drbd* devices
    # and makes LINSTOR volumes inaccessible after reboot.
    - name: Blacklist DRBD devices in multipathd
      ansible.builtin.copy:
        dest: /etc/multipath/conf.d/cozystack-drbd-blacklist.conf
        mode: "0644"
        content: |
          blacklist {
              devnode "^drbd[0-9]+"
          }
      notify: Restart multipathd

    - name: Configure sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop: "{{ cozystack_sysctl_params }}"

    - name: Stop and disable ufw
      ansible.builtin.systemd:
        name: ufw
        enabled: false
        state: stopped
      when: cozystack_flush_iptables | default(false)
      failed_when: false

    - name: Flush iptables INPUT chain
      ansible.builtin.iptables:
        chain: INPUT
        flush: true
      when: cozystack_flush_iptables | default(false)

    - name: Set iptables INPUT policy to ACCEPT
      ansible.builtin.iptables:
        chain: INPUT
        policy: ACCEPT
      when: cozystack_flush_iptables | default(false)

    - name: Enable iscsid service
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    # ignore_errors (not failed_when: false) so the registered var
    # keeps `failed` for the warn task below — failed_when: false
    # would rewrite it to False and silence the warning.
    - name: Enable multipathd service
      ansible.builtin.systemd:
        name: multipathd
        enabled: true
        state: started
      register: _cozystack_multipathd
      ignore_errors: true  # tolerated: VMs / kernels without dm_multipath

    - name: Warn if multipathd failed to start
      ansible.builtin.debug:
        msg: >-
          WARNING: multipathd could not start. Likely causes:
          dm_multipath kernel module missing, or no multipath-capable
          storage attached. LINSTOR still works without MPIO, but
          iSCSI failover will not. The DRBD blacklist file is in place
          so this will take effect once multipathd can start.
      when: _cozystack_multipathd.failed | default(false)

    # ZFS backend for LINSTOR (Ubuntu only — Debian needs contrib
    # + zfs-dkms set up manually).
    - name: Warn that ZFS on Debian needs manual setup
      ansible.builtin.debug:
        msg: >-
          NOTE: ZFS on Debian requires enabling the contrib component
          and installing zfs-dkms manually. This playbook skips ZFS
          automation on Debian. Set cozystack_enable_zfs: false to
          silence this notice.
      when:
        - cozystack_enable_zfs | default(true) | bool
        - ansible_distribution == 'Debian'

    - name: Install ZFS userspace tools
      ansible.builtin.apt:
        name: zfsutils-linux
        state: present
      when:
        - cozystack_enable_zfs | default(true) | bool
        - ansible_distribution == 'Ubuntu'

    # ignore_errors (not failed_when: false) so the registered var
    # keeps `failed` truthful for downstream gates — failed_when: false
    # would rewrite it to False and break the persistence + warn tasks
    # below.
    - name: Load ZFS kernel module now
      community.general.modprobe:
        name: zfs
      register: _cozystack_zfs_modprobe
      when:
        - cozystack_enable_zfs | default(true) | bool
        - ansible_distribution == 'Ubuntu'
      ignore_errors: true  # tolerated: Secure Boot / unsigned-module hosts

    # Only persist zfs in modules-load.d if the module actually loaded —
    # otherwise systemd-modules-load.service will fail on every boot.
    - name: Load ZFS kernel module at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack-zfs.conf
        mode: "0644"
        content: "zfs\n"
      when:
        - cozystack_enable_zfs | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - _cozystack_zfs_modprobe is defined
        - not (_cozystack_zfs_modprobe.failed | default(false))

    - name: Warn if ZFS module failed to load
      ansible.builtin.debug:
        msg: >-
          WARNING: modprobe zfs failed ({{ _cozystack_zfs_modprobe.msg | default('unknown') }}).
          LINSTOR ZFS backend will not work until this is resolved.
          Set cozystack_enable_zfs: false to silence.
      when:
        - cozystack_enable_zfs | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - _cozystack_zfs_modprobe is defined
        - _cozystack_zfs_modprobe.failed | default(false)

    # Remove the drop-in in any case where ZFS should not auto-load:
    # opt-out, Debian (not automated), or modprobe failed. Without this,
    # systemd-modules-load.service would try the absent module every boot.
    - name: Remove ZFS modules-load drop-in when not active
      ansible.builtin.file:
        path: /etc/modules-load.d/cozystack-zfs.conf
        state: absent
      when: >-
        not (cozystack_enable_zfs | default(true) | bool) or
        ansible_distribution != 'Ubuntu' or
        (_cozystack_zfs_modprobe is defined and
         _cozystack_zfs_modprobe.failed | default(false))

    # DRBD on Debian: not automated. LINBIT does not publish a Debian
    # PPA, and the in-cluster compile path that piraeus-operator falls
    # back to fails on Debian 12 hosts with Secure Boot enabled (same
    # 'Key was rejected by service' as the Ubuntu case). Operators must
    # build and sign drbd-dkms manually or disable Secure Boot.
    - name: Warn that DRBD on Debian needs manual setup
      ansible.builtin.debug:
        msg: >-
          NOTE: DRBD via dkms is not automated on Debian. piraeus-operator's
          in-cluster compile path will fail on Secure Boot hosts. Either
          disable Secure Boot, or build and sign drbd-dkms manually.
          Set cozystack_enable_drbd_dkms: false to silence this notice.
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Debian'

    # DRBD on Ubuntu releases LINBIT does not publish for: not
    # automated. LINBIT's PPA only ships drbd-dkms for the LTS series
    # they keep current (Jammy 22.04 + Noble 24.04 as of 2026);
    # interim releases (Oracular 24.10, Plucky 25.04, …) and the
    # next LTS (Resolute 26.04) before LINBIT publishes for them will
    # see apt update fail on the PPA's missing Release file, then
    # 'Unable to locate package drbd-dkms'. Gating is by release name
    # because LINBIT's PPA is keyed by release name, not version
    # number. Operators can extend cozystack_drbd_supported_releases
    # from inventory once LINBIT publishes for a new series, without
    # waiting for a collection release.
    - name: Warn that DRBD via LINBIT PPA is unavailable on this Ubuntu release
      ansible.builtin.debug:
        msg: >-
          NOTE: LINBIT's PPA does not publish drbd-dkms for Ubuntu
          {{ ansible_distribution_release }} ({{ ansible_distribution_version }});
          only the LTS series LINBIT keeps current are supported
          (jammy / noble as of 2026; extend
          cozystack_drbd_supported_releases from inventory once they
          publish a new one). On Secure Boot hosts the in-cluster
          compile path will fail with 'Key was rejected by service'.
          Build and sign drbd-dkms manually, downgrade to a supported
          LTS, or disable Secure Boot. Set
          cozystack_enable_drbd_dkms: false to silence this notice.
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release not in cozystack_drbd_supported_releases

    # DRBD via dkms from LINBIT PPA (Ubuntu releases listed in
    # cozystack_drbd_supported_releases — jammy/noble by default;
    # Debian + unsupported Ubuntu releases get the warn tasks above).
    # Required for non-Talos installs on Secure Boot hosts;
    # piraeus-operator's loader auto-detects the host-loaded module
    # and skips compilation.
    #
    # Order matters: the modprobe.d drop-in is written BEFORE
    # drbd-dkms is installed so any auto-modprobe triggered by the
    # package's postinst (or future dkms hook changes) loads the
    # module with usermode_helper=disabled. Without that param,
    # piraeus-operator's loader die()s on the host-loaded module
    # (see LINBIT/drbd docker/entry.sh).
    - name: Configure DRBD module parameters
      ansible.builtin.copy:
        dest: /etc/modprobe.d/cozystack-drbd.conf
        mode: "0644"
        content: |
          options drbd usermode_helper=disabled
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases

    - name: Add LINBIT PPA for drbd-dkms
      ansible.builtin.apt_repository:
        repo: "{{ cozystack_drbd_ppa | default('ppa:linbit/linbit-drbd9-stack') }}"
        state: present
        update_cache: true
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases

    # drbd-dkms has a hard apt dependency on drbd-utils (>= 9.28.0)
    # and pulls it onto the host transitively. The host copy of
    # drbdadm/drbdmeta/drbdsetup is never invoked at runtime —
    # piraeus-operator's satellite container ships its own
    # drbd-utils and uses that one. The host's drbd.service ships
    # disabled by maintainer; we mask it below to prevent accidental
    # `systemctl enable drbd` from conflicting with the satellite.
    - name: Install drbd-dkms
      ansible.builtin.apt:
        name: drbd-dkms
        state: present
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases

    # Mask drbd.service so the host-side userspace cannot be enabled
    # by accident. piraeus-operator manages all DRBD resources via its
    # own satellite container; host-side drbd.service would race with
    # it.
    - name: Mask host drbd.service
      ansible.builtin.systemd:
        name: drbd.service
        enabled: false
        state: stopped
        masked: true
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases

    # ignore_errors (not failed_when: false) so the registered var
    # preserves the module's `failed` flag — `failed_when: false`
    # rewrites it to False and silently breaks every downstream gate
    # in this play. Tolerated outcome is the same; introspectable
    # state is not.
    - name: Load DRBD kernel module now
      community.general.modprobe:
        name: drbd
        params: usermode_helper=disabled
      register: _cozystack_drbd_modprobe
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases
      ignore_errors: true  # tolerated: Secure Boot before MOK enrollment

    # Only persist drbd in modules-load.d if the module actually loaded —
    # otherwise systemd-modules-load.service will fail on every boot.
    - name: Load DRBD kernel module at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack-drbd.conf
        mode: "0644"
        content: "drbd\n"
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases
        - _cozystack_drbd_modprobe is defined
        - not (_cozystack_drbd_modprobe.failed | default(false))

    - name: Warn if DRBD module failed to load
      ansible.builtin.debug:
        msg: >-
          WARNING: modprobe drbd failed ({{ _cozystack_drbd_modprobe.msg | default('unknown') }}).
          On Secure Boot hosts the dkms-generated MOK key must be enrolled
          via the shim console on first reboot (Enroll MOK -> View key ->
          Continue -> dkms password). Re-run this playbook after enrollment;
          piraeus-operator will not start until DRBD is loaded with
          usermode_helper=disabled. Set cozystack_enable_drbd_dkms: false to silence.
      when:
        - cozystack_enable_drbd_dkms | default(true) | bool
        - ansible_distribution == 'Ubuntu'
        - ansible_distribution_release in cozystack_drbd_supported_releases
        - _cozystack_drbd_modprobe is defined
        - _cozystack_drbd_modprobe.failed | default(false)

    # Remove the drop-in in any case where DRBD should not auto-load:
    # opt-out, non-Ubuntu, Ubuntu release not in
    # cozystack_drbd_supported_releases (LINBIT PPA does not ship for
    # those), or modprobe failed pending MOK enrollment.
    - name: Remove DRBD modules-load drop-in when not active
      ansible.builtin.file:
        path: /etc/modules-load.d/cozystack-drbd.conf
        state: absent
      when: >-
        not (cozystack_enable_drbd_dkms | default(true) | bool) or
        ansible_distribution != 'Ubuntu' or
        ansible_distribution_release not in cozystack_drbd_supported_releases or
        (_cozystack_drbd_modprobe is defined and
         _cozystack_drbd_modprobe.failed | default(false))

    # When the operator opts out (cozystack_enable_drbd_dkms: false),
    # runs on a non-Ubuntu host, or runs on an Ubuntu release LINBIT's
    # PPA does not publish for, the modprobe.d drop-in serves no
    # purpose — remove it for symmetry with the modules-load.d
    # cleanup. The modprobe-failure case is intentionally NOT in this
    # `when:` — the param is still needed once the module loads at
    # the next reboot after MOK enrollment.
    - name: Remove DRBD modprobe.d drop-in when not active
      ansible.builtin.file:
        path: /etc/modprobe.d/cozystack-drbd.conf
        state: absent
      when: >-
        not (cozystack_enable_drbd_dkms | default(true) | bool) or
        ansible_distribution != 'Ubuntu' or
        ansible_distribution_release not in cozystack_drbd_supported_releases

    # KubeVirt kernel modules (opt-out via cozystack_enable_kubevirt=false).
    # QEMU and libvirt run inside KubeVirt pods; no host packages needed.
    # Detect CPU vendor so only the matching kvm_* module is persisted —
    # writing both would make systemd-modules-load.service fail every boot
    # on the mismatched one.
    - name: Detect CPU vendor for KVM module selection
      ansible.builtin.set_fact:
        _cozystack_kvm_module: >-
          {{ 'kvm_intel' if 'GenuineIntel' in (ansible_processor | join(' '))
             else 'kvm_amd' if 'AuthenticAMD' in (ansible_processor | join(' '))
             else '' }}
      when: cozystack_enable_kubevirt | default(true) | bool

    # Required KubeVirt modules must load; if vhost_net or tun is unavailable
    # (custom/stripped kernel) the playbook fails here rather than proceed.
    - name: Load required KubeVirt kernel modules now
      community.general.modprobe:
        name: "{{ item }}"
      loop:
        - vhost_net
        - tun
      when: cozystack_enable_kubevirt | default(true) | bool

    # Try loading the CPU-vendor KVM module; unsupported CPU, nested virt
    # disabled in BIOS, or container host → modprobe fails. Tolerate the
    # failure here and check /sys/module afterwards so the persisted
    # modules-load.d file only lists modules that actually loaded
    # (otherwise systemd-modules-load fails on every boot).
    - name: Load CPU-vendor KVM module now (best-effort)
      community.general.modprobe:
        name: "{{ _cozystack_kvm_module }}"
      failed_when: false
      when:
        - cozystack_enable_kubevirt | default(true) | bool
        - (_cozystack_kvm_module | default('')) | length > 0

    - name: Check whether CPU-vendor KVM module is loaded
      ansible.builtin.stat:
        path: "/sys/module/{{ _cozystack_kvm_module }}"
      register: _cozystack_kvm_module_stat
      when:
        - cozystack_enable_kubevirt | default(true) | bool
        - (_cozystack_kvm_module | default('')) | length > 0

    - name: Persist KubeVirt kernel modules for boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/cozystack-kubevirt.conf
        mode: "0644"
        content: |
          vhost_net
          tun
          {% if _cozystack_kvm_module_stat is defined and (_cozystack_kvm_module_stat.stat.exists | default(false)) %}
          {{ _cozystack_kvm_module }}
          {% endif %}
      when: cozystack_enable_kubevirt | default(true) | bool

    - name: Remove KubeVirt modules-load drop-in when disabled
      ansible.builtin.file:
        path: /etc/modules-load.d/cozystack-kubevirt.conf
        state: absent
      when: not (cozystack_enable_kubevirt | default(true) | bool)
