---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - cozystack_api_server_host is defined
      - cozystack_api_server_host | length > 0
    fail_msg: >-
      cozystack_api_server_host must be defined and non-empty.
      It must be the node's INTERNAL IP
      (visible on network interface, not public/NAT IP).

# The cozy-installer chart hardcodes `name: cozy-system` in
# templates/cozystack-operator.yaml — there is no values key for the
# operator namespace. Fail loudly if an old inventory still sets the
# variable, so users get an explicit upgrade signal instead of
# silently broken wait/patch tasks pointing at the override.
- name: Reject removed cozystack_namespace variable
  ansible.builtin.assert:
    that:
      - cozystack_namespace is not defined
    fail_msg: >-
      cozystack_namespace was removed from this role's variables.
      The cozy-installer chart hardcodes 'cozy-system' in
      templates/cozystack-operator.yaml and provides no override.
      Remove cozystack_namespace from inventory.

- name: Compute and validate master node IPs for kube-ovn
  ansible.builtin.include_tasks: compute-master-nodes.yml
  when: cozystack_create_platform_package

- name: Validate external IP addresses
  ansible.builtin.include_tasks: validate-external-ips.yml
  when:
    - cozystack_create_platform_package
    - cozystack_external_ips | length > 0

- name: Set architecture for Helm download
  ansible.builtin.set_fact:
    _cozystack_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

- name: Check installed Helm version
  ansible.builtin.command:
    cmd: "{{ cozystack_helm_binary }} version --short"
  register: _cozystack_helm_version_check
  changed_when: false
  failed_when: false

- name: Install Helm binary
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-v{{ cozystack_helm_version }}-linux-{{ _cozystack_arch }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
      - "linux-{{ _cozystack_arch }}/helm"
  become: true
  when:
    - not ansible_check_mode
    - cozystack_helm_version not in (_cozystack_helm_version_check.stdout | default(''))

- name: Ensure git is installed (required by helm plugin install)
  ansible.builtin.package:
    name: git
    state: present
  become: true

- name: Install helm-diff plugin
  kubernetes.core.helm_plugin:
    plugin_path: https://github.com/databus23/helm-diff
    plugin_version: "{{ cozystack_helm_diff_version }}"
    state: present
    binary_path: "{{ cozystack_helm_binary }}"
  become: true
  when: not ansible_check_mode

# The cozy-installer chart templates `Namespace cozy-system`.
# If that namespace was created out of band — by a manual
# `kubectl create ns`, by a previous failed install, or by a
# different chart — `helm install` fails with
#   Namespace "cozy-system" exists and cannot be imported into the
#   current release: invalid ownership metadata
# Adopt the namespace by stamping helm release labels and
# annotations before the helm install runs. No-op when the namespace
# does not exist or already carries the right metadata. Refuses to
# proceed if the namespace is owned by a *different* helm release —
# that case requires operator intervention, not silent re-adoption.
- name: Look up cozy-system namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ cozystack_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: cozy-system
  become: true
  register: _cozystack_ns_info
  when: not ansible_check_mode

- name: Refuse to overwrite cozy-system if owned by another helm release
  ansible.builtin.fail:
    msg: >-
      cozy-system namespace is owned by helm release '{{ _release_name }}'
      in namespace '{{ _release_namespace }}', not by this role's
      cozystack_release_name='{{ cozystack_release_name }}' in
      cozystack_release_namespace='{{ cozystack_release_namespace }}'.
      Refusing to overwrite ownership metadata. Either uninstall the
      conflicting release, delete the namespace, or align
      cozystack_release_name / cozystack_release_namespace with the
      existing owner.
  vars:
    _ns: "{{ (_cozystack_ns_info.resources | default([]) | first) | default({}) }}"
    _labels: "{{ _ns.metadata.labels | default({}) }}"
    _annotations: "{{ _ns.metadata.annotations | default({}) }}"
    _release_name: "{{ _annotations.get('meta.helm.sh/release-name', '') }}"
    _release_namespace: "{{ _annotations.get('meta.helm.sh/release-namespace', '') }}"
  # Refuse if ANY helm metadata indicator is present and mismatched.
  # Gating purely on managed-by would miss the (rare) state where a
  # prior install left annotations behind without the label.
  when:
    - not ansible_check_mode
    - _cozystack_ns_info.resources | default([]) | length > 0
    - >-
      (_labels.get('app.kubernetes.io/managed-by', '') == 'Helm'
       and (_release_name != cozystack_release_name
            or _release_namespace != cozystack_release_namespace))
      or (_release_name | length > 0
          and _release_name != cozystack_release_name)
      or (_release_namespace | length > 0
          and _release_namespace != cozystack_release_namespace)

- name: Adopt cozy-system namespace into helm release
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      patch namespace cozy-system
      --type=merge
      --patch '{
        "metadata": {
          "labels": {"app.kubernetes.io/managed-by": "Helm"},
          "annotations": {
            "meta.helm.sh/release-name": "{{ cozystack_release_name }}",
            "meta.helm.sh/release-namespace": "{{ cozystack_release_namespace }}"
          }
        }
      }'
  become: true
  register: _cozystack_ns_adopt
  changed_when: "'patched' in _cozystack_ns_adopt.stdout and '(no change)' not in _cozystack_ns_adopt.stdout"
  vars:
    _ns: "{{ (_cozystack_ns_info.resources | default([]) | first) | default({}) }}"
    _labels: "{{ _ns.metadata.labels | default({}) }}"
    _annotations: "{{ _ns.metadata.annotations | default({}) }}"
  when:
    - not ansible_check_mode
    - _cozystack_ns_info.resources | default([]) | length > 0
    - _labels.get('app.kubernetes.io/managed-by', '') != 'Helm'
      or _annotations.get('meta.helm.sh/release-name', '') != cozystack_release_name
      or _annotations.get('meta.helm.sh/release-namespace', '') != cozystack_release_namespace

- name: Install Cozystack chart
  kubernetes.core.helm:
    release_name: "{{ cozystack_release_name }}"
    chart_ref: "{{ cozystack_chart_ref }}"
    chart_version: "{{ cozystack_chart_version }}"
    release_namespace: "{{ cozystack_release_namespace }}"
    kubeconfig: "{{ cozystack_kubeconfig }}"
    binary_path: "{{ cozystack_helm_binary }}"
    values:
      cozystackOperator:
        variant: "{{ cozystack_operator_variant }}"
      cozystack:
        apiServerHost: "{{ cozystack_api_server_host }}"
        apiServerPort: "{{ cozystack_api_server_port }}"
  become: true
  when: not ansible_check_mode

- name: Wait for operator deployment to be available
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      wait deployment/cozystack-operator
      --namespace cozy-system
      --timeout={{ cozystack_operator_wait_timeout }}s
      --for=condition=Available
  become: true
  changed_when: false
  when:
    - cozystack_create_platform_package
    - not ansible_check_mode

- name: Wait for Package CRD to be established
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      wait crd/packages.cozystack.io
      --for=condition=Established
      --timeout={{ cozystack_operator_wait_timeout }}s
  become: true
  changed_when: false
  register: crd_wait
  retries: 5
  delay: 10
  until: crd_wait.rc == 0
  when:
    - cozystack_create_platform_package
    - not ansible_check_mode

- name: Construct API server endpoint
  ansible.builtin.set_fact:
    _cozystack_api_endpoint: "https://{{ cozystack_api_server_host }}:{{ cozystack_api_server_port }}"
  when: cozystack_create_platform_package

- name: Generate Platform Package manifest
  ansible.builtin.template:
    src: platform-package.yml.j2
    dest: /tmp/cozystack-platform-package.yml
    mode: "0600"
  become: true
  changed_when: false
  when: cozystack_create_platform_package

- name: Check if Platform Package differs from cluster state
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      diff --filename /tmp/cozystack-platform-package.yml
  become: true
  register: platform_diff
  changed_when: platform_diff.rc == 1
  failed_when: platform_diff.rc > 1
  when:
    - cozystack_create_platform_package
    - not ansible_check_mode

- name: Apply Platform Package
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      apply --filename /tmp/cozystack-platform-package.yml
  become: true
  register: platform_apply
  changed_when: platform_apply.rc == 0
  when:
    - cozystack_create_platform_package
    - platform_diff is changed
    - not ansible_check_mode

- name: Remove temporary Platform Package manifest
  ansible.builtin.file:
    path: /tmp/cozystack-platform-package.yml
    state: absent
  become: true
  changed_when: false
  when: cozystack_create_platform_package

- name: Wait for root Tenant to exist
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      wait tenants.apps.cozystack.io/root
      --namespace tenant-root
      --for=jsonpath='{.metadata.name}'=root
      --timeout={{ cozystack_operator_wait_timeout }}s
  become: true
  changed_when: false
  register: _tenant_wait
  retries: 5
  delay: 15
  until: _tenant_wait.rc == 0
  when:
    - cozystack_tenant_root_ingress
    - cozystack_create_platform_package
    - not ansible_check_mode

- name: Enable ingress on root Tenant
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig {{ cozystack_kubeconfig }}
      patch tenants.apps.cozystack.io root
      --namespace tenant-root
      --type=merge
      --patch '{"spec":{"ingress":true}}'
  become: true
  register: _tenant_patch
  changed_when: "'patched' in _tenant_patch.stdout and '(no change)' not in _tenant_patch.stdout"
  when:
    - cozystack_tenant_root_ingress
    - cozystack_create_platform_package
    - not ansible_check_mode
