---
# Verify the host LVM global_filter task used by the example prepare
# playbooks (examples/*/prepare-*.yml). The canonical task parameters are
# defined once and asserted against all three playbooks (drift guard), then
# each scenario builds a throwaway lvm.conf and asks LVM itself
# (`lvmconfig devices/global_filter` via LVM_SYSTEM_DIR) whether the filter is
# effective — the same post-write check the playbooks run. Requires the lvm2
# package (lvmconfig); the Test workflow installs it.
- name: Test host LVM global_filter task behaviour
  hosts: localhost
  gather_facts: false
  vars:
    # The canonical task parameters. The drift guard proves the three prepare
    # playbooks still use exactly these values.
    _lvm_regexp: '^\s*#?\s*global_filter\s*='
    _lvm_insertafter: '^\s*devices\s*{'
    _lvm_default_list:
      - "r|^/dev/drbd.*|"
      - "r|^/dev/dm-.*|"
      - "r|^/dev/zd.*|"
      - "r|^/dev/loop.*|"
    # Expected rendered line for the shipped default (to_json output).
    _lvm_expected_default_line: '        global_filter = ["r|^/dev/drbd.*|", "r|^/dev/dm-.*|", "r|^/dev/zd.*|", "r|^/dev/loop.*|"]'
    # The exact templated value from the prepare playbooks. Re-rendered on
    # every use, so a task-level cozystack_lvm_global_filter override is
    # picked up automatically.
    _lvm_filter_line: '        global_filter = {{ cozystack_lvm_global_filter |
      default(["r|^/dev/drbd.*|", "r|^/dev/dm-.*|", "r|^/dev/zd.*|",
      "r|^/dev/loop.*|"]) | to_json }}'
    # Same template as a raw (un-rendered) literal — strings parsed out of a
    # playbook with from_yaml are NOT re-templated, so the drift guard compares
    # the playbooks' `line` against this raw form, not the rendered one.
    _lvm_raw_line: '{% raw %}        global_filter = {{ cozystack_lvm_global_filter |
      default(["r|^/dev/drbd.*|", "r|^/dev/dm-.*|", "r|^/dev/zd.*|",
      "r|^/dev/loop.*|"]) | to_json }}{% endraw %}'
    _lvm_task_name: Exclude virtual and loop devices from host LVM scanning
    _lvm_prepare_playbooks:
      - "{{ playbook_dir }}/../examples/rhel/prepare-rhel.yml"
      - "{{ playbook_dir }}/../examples/suse/prepare-suse.yml"
      - "{{ playbook_dir }}/../examples/ubuntu/prepare-ubuntu.yml"
    _lvm_base: /tmp/cozystack-lvmtest
    # One scenario per lvm.conf shape. `effective` is whether LVM should honour
    # the filter afterwards (i.e. it landed inside a devices {} block).
    _lvm_cases:
      # Upstream-style: a commented global_filter already inside devices {}.
      # The regexp replaces it in place.
      - name: stock
        effective: true
        content: |
          # Sample lvm.conf
          devices {
              dir = "/dev"
              scan = [ "/dev" ]
              # global_filter = [ "a|.*/|" ]
          }
          global {
              umask = 63
          }
      # No global_filter yet: insertafter drops it after the devices header.
      - name: nofilter
        effective: true
        content: |
          devices {
              dir = "/dev"
          }
          global {
              umask = 63
          }
      # Indented devices header: the whitespace-tolerant anchor must still
      # place the filter inside the block (the strict '^devices {' would not).
      - name: indented
        effective: true
        content: |
          config {
              checks = 1
          }
              devices {
                  dir = "/dev"
              }
      # Override drops the dm- entry (the LVM-on-LUKS / multipath escape hatch).
      - name: override
        effective: true
        override:
          - "r|^/dev/drbd.*|"
          - "r|^/dev/loop.*|"
        content: |
          devices {
              dir = "/dev"
          }
      # No devices {} block at all: the line lands at EOF, outside every
      # section, so LVM ignores it. The playbooks' post-write check fails loud
      # on this; here we assert LVM reports the filter as NOT effective.
      - name: noblock
        effective: false
        content: |
          global {
              umask = 63
          }
  tasks:
    - name: Render the shipped default and assert valid LVM global_filter syntax
      ansible.builtin.assert:
        that:
          - _lvm_filter_line == _lvm_expected_default_line
        fail_msg: >-
          Default global_filter drifted. Rendered '{{ _lvm_filter_line }}',
          expected '{{ _lvm_expected_default_line }}'.

    - name: Assert all prepare playbooks use the canonical task parameters
      ansible.builtin.assert:
        that:
          - _pb_task.regexp == _lvm_regexp
          - _pb_task.insertafter == _lvm_insertafter
          - _pb_task.line == _lvm_raw_line
        fail_msg: >-
          {{ item }} global_filter task drifted from the canonical
          regexp/insertafter/line tested here.
      loop: "{{ _lvm_prepare_playbooks }}"
      vars:
        _pb_task: "{{ ((lookup('file', item) | from_yaml)[0].tasks | selectattr('name', 'eq', _lvm_task_name) | first)['ansible.builtin.lineinfile'] }}"

    - name: Exercise every lvm.conf scenario
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks-lvm-global-filter-case.yml"
      loop: "{{ _lvm_cases }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Remove fixture tree
      ansible.builtin.file:
        path: "{{ _lvm_base }}"
        state: absent
